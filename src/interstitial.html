<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>Tabby</title>
    <link rel="stylesheet" href="interstitial.css" />
  </head>
  <body>
    <div class="backdrop" aria-hidden="true">
      <img
        id="backdrop-img"
        class="backdrop-img"
        alt=""
        width="1920"
        height="1080"
        decoding="sync"
        fetchpriority="high"
      />
      <!-- External script required: MV3 CSP blocks inline script on extension pages. -->
      <script src="interstitial-hero-boot.js"></script>
      <div class="backdrop-scrim"></div>
    </div>

    <div class="page">
      <header class="brand" aria-label="Tabby">
        <span class="brand-lockup">
          <img
            class="brand-lockup-img"
            src="assets/tabby-brand-lockup.png"
            width="1536"
            height="1024"
            alt="Tabby"
            decoding="async"
          />
        </span>
      </header>

      <aside class="quote-monument" aria-label="Daily quote">
        <blockquote class="quote monument-pullquote" id="quote-block" cite="signals">
          <p class="monument-line" id="quote-l1"></p>
          <p class="monument-line monument-line--secondary" id="quote-l2"></p>
          <footer class="monument-by" id="quote-by"></footer>
        </blockquote>
      </aside>

      <aside class="tab-thumb" id="tab-thumb" hidden aria-hidden="true">
        <div class="tab-thumb-inner">
          <div class="tab-thumb-frame">
            <img id="tab-thumb-img" class="tab-thumb-img" alt="" width="72" height="72" decoding="async" hidden />
            <span class="tab-thumb-initial" id="tab-thumb-initial" hidden aria-hidden="true"></span>
          </div>
          <div class="tab-thumb-copy">
            <p class="tab-thumb-title" id="tab-thumb-title"></p>
            <p class="tab-thumb-recency" id="tab-thumb-recency" hidden></p>
            <p class="tab-thumb-live-title" id="tab-thumb-live-title" hidden></p>
            <p class="tab-thumb-canonical" id="tab-thumb-canonical" hidden></p>
            <p class="tab-thumb-desc" id="tab-thumb-desc" hidden></p>
          </div>
        </div>
      </aside>

      <p class="dup-restore-hint" id="dup-restore-hint" hidden aria-live="polite">
        Esc — show choices
      </p>

      <main class="dialog-card" id="dialog-card">
        <section class="mode mode-duplicate" id="panel-dup" hidden>
          <h1 class="title">You already have this page open</h1>
          <p class="sub sub--dup-host"><span class="host" id="host"></span></p>
          <p class="keys err-msg" id="hint-dup" hidden role="alert"></p>
          <ul
            class="list"
            id="list"
            role="listbox"
            aria-label="Tabs and actions for this duplicate page"
          ></ul>
        </section>

        <section class="mode mode-consolidate" id="panel-con" hidden>
          <h1 class="title" id="con-title">Quite a few tabs for this site</h1>
          <p class="sub" id="con-body"></p>
          <p class="keys err-msg" id="hint-con-err" hidden role="alert"></p>
          <ul
            class="list con-list"
            id="con-list"
            role="listbox"
            aria-label="Existing tabs on this site"
            hidden
          ></ul>
          <div class="actions">
            <button type="button" class="btn primary" id="btn-keep">
              <span class="btn-text">Open in this tab</span>
              <kbd class="btn-kbd" aria-hidden="true">Enter</kbd>
            </button>
            <button type="button" class="btn" id="btn-merge">
              <span class="btn-text">Tidy up &amp; continue</span>
              <kbd class="btn-kbd" aria-hidden="true">C</kbd>
            </button>
            <button type="button" class="btn btn-ghost" id="btn-con-stay">
              <span class="btn-text">Stay on this screen</span>
              <kbd class="btn-kbd" aria-hidden="true">Esc</kbd>
            </button>
          </div>
        </section>

        <p class="footnote" id="footnote"></p>
      </main>
    </div>
    <script type="module" src="interstitial.js"></script>
  </body>
</html>
