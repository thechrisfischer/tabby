<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>Tabby</title>
    <style>
      :root {
        color-scheme: light dark;
      }
      body {
        margin: 0;
        width: 300px;
        font:
          13px system-ui,
          -apple-system,
          sans-serif;
        padding: 14px 14px 12px;
      }
      h1 {
        font-size: 14px;
        margin: 0 0 6px;
      }
      p {
        margin: 0 0 10px;
        color: color-mix(in srgb, CanvasText 72%, Canvas);
        line-height: 1.45;
      }
      #status {
        margin: 0 0 12px;
        font-size: 12px;
        line-height: 1.45;
        color: color-mix(in srgb, CanvasText 78%, Canvas);
        min-height: 2.8em;
      }
      #status[data-kind="err"] {
        color: #c5221f;
      }
      @media (prefers-color-scheme: dark) {
        #status[data-kind="err"] {
          color: #f9ab9e;
        }
      }
      #status[data-kind="ok"] {
        color: color-mix(in srgb, CanvasText 88%, Canvas);
      }
      button {
        width: 100%;
        font: inherit;
        font-weight: 600;
        padding: 8px 10px;
        border-radius: 8px;
        border: 1px solid color-mix(in srgb, CanvasText 16%, Canvas);
        background: color-mix(in srgb, CanvasText 8%, Canvas);
        color: CanvasText;
        cursor: pointer;
      }
      button:disabled {
        opacity: 0.45;
        cursor: default;
      }
      button:not(:disabled):hover {
        background: color-mix(in srgb, CanvasText 12%, Canvas);
      }
      #undo {
        margin-top: 8px;
        background: color-mix(in srgb, CanvasText 4%, Canvas);
        border-color: color-mix(in srgb, CanvasText 22%, Canvas);
      }
      #undo[hidden] {
        display: none;
      }
      .settings-label {
        display: block;
        margin-top: 12px;
        font-size: 11px;
        font-weight: 600;
        color: color-mix(in srgb, CanvasText 60%, Canvas);
        text-transform: uppercase;
        letter-spacing: 0.04em;
      }
      .settings-select {
        width: 100%;
        margin-top: 4px;
        font: inherit;
        padding: 6px 8px;
        border-radius: 6px;
        border: 1px solid color-mix(in srgb, CanvasText 16%, Canvas);
        background: color-mix(in srgb, CanvasText 4%, Canvas);
        color: CanvasText;
      }
      .keeper-note {
        margin-top: 8px;
        font-size: 11px;
        color: color-mix(in srgb, CanvasText 55%, Canvas);
        line-height: 1.4;
      }
    </style>
  </head>
  <body>
    <h1>Tabby</h1>
    <p>
      Guardrails for operators: catch exact duplicate URLs before you fragment attention, and
      consolidate stacked hostnames when you are ready to trim the noise.
    </p>
    <p id="status" aria-live="polite"></p>
    <button type="button" id="consolidate" disabled>Consolidate duplicate hostnames</button>
    <button type="button" id="undo" hidden>Undo</button>
    <label for="cooldown" class="settings-label">Re-check sites every:</label>
    <select id="cooldown" class="settings-select">
      <option value="0">Off — only when tabs keep stacking</option>
      <option value="300000">5 min</option>
      <option value="1800000">30 min</option>
      <option value="3600000">1 hour</option>
      <option value="21600000">6 hours</option>
    </select>
    <p class="keeper-note">Keeps your active tab plus the most recent per site.</p>
    <label for="persona" class="settings-label">Interstitial backdrop:</label>
    <select id="persona" class="settings-select">
      <option value="landscape">Landscapes</option>
      <option value="cats">Cats playing</option>
      <option value="fractals">Fractals &amp; digital art</option>
    </select>
    <script src="popup.js"></script>
  </body>
</html>
