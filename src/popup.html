<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>Tabby</title>
    <style>
      :root {
        color-scheme: light dark;
      }
      body {
        margin: 0;
        width: 300px;
        font:
          13px system-ui,
          -apple-system,
          sans-serif;
        padding: 14px 14px 12px;
      }
      h1 {
        font-size: 14px;
        margin: 0 0 6px;
      }
      p {
        margin: 0 0 10px;
        color: color-mix(in srgb, CanvasText 72%, Canvas);
        line-height: 1.45;
      }
      #status {
        margin: 0 0 12px;
        font-size: 12px;
        line-height: 1.45;
        color: color-mix(in srgb, CanvasText 78%, Canvas);
        min-height: 2.8em;
      }
      #status[data-kind="err"] {
        color: #c5221f;
      }
      @media (prefers-color-scheme: dark) {
        #status[data-kind="err"] {
          color: #f9ab9e;
        }
      }
      #status[data-kind="ok"] {
        color: color-mix(in srgb, CanvasText 88%, Canvas);
      }
      button {
        width: 100%;
        font: inherit;
        font-weight: 600;
        padding: 8px 10px;
        border-radius: 8px;
        border: 1px solid color-mix(in srgb, CanvasText 16%, Canvas);
        background: color-mix(in srgb, CanvasText 8%, Canvas);
        color: CanvasText;
        cursor: pointer;
      }
      button:disabled {
        opacity: 0.45;
        cursor: default;
      }
      button:not(:disabled):hover {
        background: color-mix(in srgb, CanvasText 12%, Canvas);
      }
    </style>
  </head>
  <body>
    <h1>Tabby</h1>
    <p>
      Warns before opening another tab to the same hostname. Consolidate clears extras so only
      one tab remains per hostname (same rule as the guard).
    </p>
    <p id="status" aria-live="polite"></p>
    <button type="button" id="consolidate" disabled>Consolidate duplicate tabs</button>
    <script src="popup.js"></script>
  </body>
</html>
